<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NBA Team League 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F8F7F4;color:#1A1A1A;-webkit-font-smoothing:antialiased}

/* Ticker */
.ticker-wrap{background:#111;overflow:hidden;height:36px;position:relative;border-bottom:1px solid #2a2a2a}
.ticker{display:flex;animation:scroll 50s linear infinite;white-space:nowrap;align-items:center;height:36px}
.ticker:hover{animation-play-state:paused}
.ticker-item{padding:0 24px;font-size:11px;font-weight:600;color:#ccc;letter-spacing:.5px;display:flex;align-items:center;gap:8px;border-right:1px solid #2a2a2a}
.ticker-item .owner{color:#E8A838;font-weight:700;font-size:10px}
.ticker-item .score{color:#fff;font-weight:800;font-family:'Playfair Display',serif}
.ticker-item .status{color:#E8A838;font-size:9px;letter-spacing:1px;font-weight:800}
.ticker-item .status.live{color:#4ade80}
.ticker-item .status.final{color:#888}
.ticker-item .pulse{display:inline-block;width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Header */
.header{text-align:center;padding:28px 16px 20px;background:linear-gradient(180deg,#0a0a0a 0%,#1A1A1A 100%);position:relative;overflow:hidden}
.header:before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(232,168,56,.08),transparent 70%);pointer-events:none}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,36px);color:#fff;font-weight:900;letter-spacing:2px;position:relative}
.header .sub{font-size:10px;color:#E8A838;letter-spacing:3px;font-weight:700;margin-top:4px;position:relative}

/* Champion banner */
.champ-banner{background:linear-gradient(135deg,#E8A838 0%,#C8891F 100%);color:#111;padding:14px 16px;text-align:center;font-weight:800;letter-spacing:1px;position:relative;overflow:hidden;border-top:1px solid rgba(0,0,0,.1);border-bottom:1px solid rgba(0,0,0,.1)}
.champ-banner:before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shine 4s ease-in-out infinite}
@keyframes shine{0%{left:-100%}50%,100%{left:100%}}
.champ-banner .crown{font-size:20px;display:inline-block;margin-right:8px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))}
.champ-banner .title{font-size:10px;font-family:'DM Sans',sans-serif;opacity:.75;letter-spacing:2.5px;display:block}
.champ-banner .name{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:3px;display:inline-block;margin:2px 0}
.champ-banner .prize{font-size:11px;font-weight:700;opacity:.9;display:block;margin-top:2px}

/* Layout */
.content{max-width:720px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.card-hd{background:#111;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.card-hd span{color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px}
.card-hd .badge{background:#E8A838;color:#111;font-size:9px;font-weight:800;padding:3px 8px;border-radius:3px;letter-spacing:1px}
.card-hd .badge.live{background:#4ade80;color:#111;display:flex;align-items:center;gap:5px}
.card-hd .badge.locked{background:#2D2D2D;color:#E8A838;border:1px solid #E8A838}
.card-hd .live-dot{width:6px;height:6px;background:#111;border-radius:50%;animation:pulse 1.5s ease-in-out infinite}

/* Tabs */
.tabs{display:flex;background:#fff;border-radius:10px;padding:4px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:10px 6px;background:transparent;border:none;font-size:10px;font-weight:700;letter-spacing:1px;color:#888;cursor:pointer;border-radius:6px;transition:all .15s;white-space:nowrap;font-family:inherit}
.tab.active{background:#111;color:#fff}

/* Tables */
table{width:100%;border-collapse:collapse}
th{background:#F5F3EE;font-size:9px;font-weight:700;letter-spacing:1px;color:#666;padding:10px 8px;text-align:center;border-bottom:1px solid #E8E4DC}
td{padding:10px 8px;font-size:13px;text-align:center;border-bottom:1px solid #F5F3EE;vertical-align:middle}
tr:last-child td{border-bottom:none}
.mgr-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;text-align:left!important;letter-spacing:.5px}
.wins-cell{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#111}
.wins-cell.lead{color:#E8A838}
.rank-cell{font-family:'Playfair Display',serif;font-size:20px;font-weight:900}
.rank-cell.gold{color:#E8A838}
.gb-cell{font-size:11px;color:#999;font-weight:600}

/* Team logos */
.logo{width:28px;height:28px;border-radius:50%;vertical-align:middle;display:inline-block}
.logo.sm{width:22px;height:22px}
.logo.md{width:32px;height:32px}
.logo.lg{width:44px;height:44px}
.team-row{display:flex;align-items:center;gap:8px;text-align:left}
.team-row .name{font-weight:600;font-size:13px}
.team-row.elim .name{text-decoration:line-through;color:#999}
.team-row.elim .logo{opacity:.4;filter:grayscale(100%)}

/* Playoff bracket */
.bracket{display:grid;grid-template-columns:1fr;gap:12px;padding:16px}
.conf-label{font-size:10px;font-weight:800;letter-spacing:2px;color:#E8A838;text-align:center;margin:6px 0 2px;padding-top:8px;border-top:1px solid #F0EDE5}
.conf-label:first-child{border-top:none;padding-top:0}
.series{background:#FAF9F5;border-radius:8px;padding:12px;border:1px solid #EDE8DC}
.series.final{opacity:.65}
.series-hd{display:flex;justify-content:space-between;align-items:center;font-size:9px;font-weight:700;letter-spacing:1px;color:#888;margin-bottom:10px}
.series-hd .seed-tag{background:#111;color:#fff;padding:2px 6px;border-radius:3px;font-size:9px;letter-spacing:.5px}
.series-hd .status-live{color:#4ade80;display:flex;align-items:center;gap:4px}
.series-hd .status-live .dot{width:5px;height:5px;background:#4ade80;border-radius:50%;animation:pulse 1.5s infinite}
.series-hd .status-done{color:#888}
.series-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.series-row .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.series-row .seed{font-family:'Playfair Display',serif;font-size:14px;font-weight:800;color:#999;width:18px;text-align:center}
.series-row .team-info{flex:1;min-width:0}
.series-row .team-info .name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.series-row .team-info .owner{font-size:9px;color:#E8A838;letter-spacing:.5px;font-weight:700;text-transform:uppercase}
.series-row .wins{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;min-width:28px;text-align:center}
.series-row.eliminated .name{text-decoration:line-through;color:#aaa}
.series-row.eliminated .logo{opacity:.35;filter:grayscale(100%)}
.series-row.advanced .wins{color:#16a34a}
.series-row.advanced .seed{color:#16a34a}
.vs-divider{text-align:center;font-size:9px;color:#bbb;letter-spacing:2px;padding:2px 0;font-weight:700}

/* Manager playoff tracker */
.mgr-tracker{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.mgr-card{background:#FAF9F5;border:1px solid #EDE8DC;border-radius:8px;padding:12px;text-align:center;position:relative}
.mgr-card.leader{background:linear-gradient(135deg,#FFF9E6 0%,#FFFDF5 100%);border-color:#E8A838}
.mgr-card .mgr{font-family:'Playfair Display',serif;font-size:16px;font-weight:800;margin-bottom:4px}
.mgr-card .count{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:#111;line-height:1}
.mgr-card.leader .count{color:#E8A838}
.mgr-card .label{font-size:9px;color:#888;letter-spacing:1px;margin-top:2px;font-weight:700}
.mgr-card .teams{margin-top:8px;display:flex;justify-content:center;gap:3px;flex-wrap:wrap}
.mgr-card .teams .logo{width:18px;height:18px}

/* Matchup cards */
.matchup-grid{padding:12px;display:grid;grid-template-columns:1fr;gap:8px}
.matchup-card{background:#FAF9F5;border-radius:8px;padding:12px;border:1px solid #EDE8DC}
.matchup-card.live{border-color:#4ade80;background:linear-gradient(135deg,#F0FFF4 0%,#FAFFF7 100%)}
.matchup-card.final{opacity:.75}
.matchup-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:9px;font-weight:700;letter-spacing:1px;color:#888}
.matchup-hd .game-tag{background:#111;color:#fff;padding:2px 6px;border-radius:3px;font-size:9px}
.matchup-hd .status{color:#4ade80}
.matchup-hd .status.final{color:#888}
.matchup-teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.matchup-team{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.matchup-team.right{flex-direction:row-reverse;text-align:right}
.matchup-team .info .name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.matchup-team .info .owner{font-size:9px;color:#E8A838;font-weight:700;letter-spacing:.5px}
.matchup-score{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;min-width:36px;text-align:center}

/* Footer */
.footer{text-align:center;font-size:10px;color:#999;padding:20px;letter-spacing:1px;font-weight:600}

/* Empty state */
.empty{padding:32px 16px;text-align:center;color:#999;font-size:12px}

/* Playoff status tags (used in Standings and All Teams) */
.playoff-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.5px}
.playoff-tag.in{background:#E6F7EE;color:#16a34a}
.playoff-tag.elim{background:#F3F3F3;color:#999}
.playoff-tag.advanced{background:#16a34a;color:#fff}

.mgr-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.5px;background:#111;color:#E8A838}
</style>
</head>

<script type="text/babel">
var useState = React.useState;
var useEffect = React.useEffect;

// ============ HELPERS ============
function TeamLogo(props){
  var src = LOGOS[props.name];
  var cls = "logo" + (props.size ? " " + props.size : "");
  if(!src) return <div className={cls} style={{background:"#ddd"}}></div>;
  return <img src={src} alt={props.name} className={cls}/>;
}

function OwnerTag(props){
  var o = OWNER_MAP[props.team] || "Undrafted";
  return <span className="mgr-tag">{o}</span>;
}

// ============ MAIN APP ============
function App(){
  var [tab, setTab] = useState("standings");
  var [liveGames, setLiveGames] = useState([]);
  var [seriesState, setSeriesState] = useState(null); // {seriesKey:{hiWins,loWins,status}}
  var [lastUpdate, setLastUpdate] = useState(null);
  var [loading, setLoading] = useState(true);

  // Fetch scoreboard — picks up any playoff games happening today/recently
  function fetchScoreboard(){
    return fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard")
      .then(function(r){ return r.json(); })
      .then(function(data){
        var games = [];
        if(data && data.events){
          data.events.forEach(function(ev){
            var comp = ev.competitions && ev.competitions[0];
            if(!comp) return;
            var home=null, away=null;
            (comp.competitors||[]).forEach(function(c){
              var shortName = NAME_MAP[c.team.displayName] || c.team.displayName;
              var obj = {
                team: shortName,
                score: parseInt(c.score) || 0,
                homeAway: c.homeAway
              };
              if(c.homeAway === "home") home = obj;
              else away = obj;
            });
            if(home && away){
              var st = ev.status && ev.status.type;
              games.push({
                id: ev.id,
                home: home,
                away: away,
                state: st ? st.state : "pre",     // "pre","in","post"
                detail: st ? st.shortDetail : "",
                completed: st ? st.completed : false
              });
            }
          });
        }
        setLiveGames(games);
        setLastUpdate(new Date());
        setLoading(false);
      })
      .catch(function(e){ setLoading(false); });
  }

  useEffect(function(){
    fetchScoreboard();
    var interval = setInterval(fetchScoreboard, 30000);
    return function(){ clearInterval(interval); };
  }, []);

  // Compute manager totals from FINAL_RECORDS (locked)
  function managerTotals(){
    var out = [];
    Object.keys(ROSTERS).forEach(function(mgr){
      var total = 0;
      ROSTERS[mgr].forEach(function(t){
        if(FINAL_RECORDS[t]) total += FINAL_RECORDS[t].w;
      });
      out.push({ name: mgr, wins: total, teams: ROSTERS[mgr] });
    });
    out.sort(function(a,b){ return b.wins - a.wins; });
    return out;
  }

  // Compute series status from live games + seed data
  // Maps scoreboard results to series (home/away team match in a series)
  function computeSeries(){
    var result = {};
    var allSeries = PLAYOFF_BRACKET.east.concat(PLAYOFF_BRACKET.west);
    allSeries.forEach(function(s){
      var key = s.hi + "_" + s.lo;
      result[key] = { hiWins: 0, loWins: 0, games: [] };
    });
    // Walk through live games — only playoff games count (we filter by teams appearing in bracket)
    var playoffTeamSet = {};
    PLAYOFF_TEAMS.forEach(function(t){ playoffTeamSet[t] = true; });
    liveGames.forEach(function(g){
      var h = g.home.team, a = g.away.team;
      if(!playoffTeamSet[h] || !playoffTeamSet[a]) return;
      // Find the series
      var matched = null;
      allSeries.forEach(function(s){
        if((s.hi===h && s.lo===a) || (s.hi===a && s.lo===h)){
          matched = s;
        }
      });
      if(!matched) return;
      var key = matched.hi + "_" + matched.lo;
      // Only count completed games
      if(g.completed){
        var winner = g.home.score > g.away.score ? h : a;
        if(winner === matched.hi) result[key].hiWins++;
        else result[key].loWins++;
      }
      result[key].games.push(g);
    });
    return result;
  }

  var mgrTotals = managerTotals();
  var champion = mgrTotals[0];
  var series = computeSeries();

  // Playoff games for "Today" feed (live or recent)
  function todaysPlayoffGames(){
    var playoffSet = {};
    PLAYOFF_TEAMS.forEach(function(t){ playoffSet[t] = true; });
    return liveGames.filter(function(g){
      return playoffSet[g.home.team] && playoffSet[g.away.team];
    });
  }

  return (
    <div>

              <span>{item.teamA}</span>
              <span className="score">{item.scoreA}</span>
              <span style={{color:"#555"}}>—</span>
              <span className="score">{item.scoreB}</span>
              <span>{item.teamB}</span>
              <span className="owner">{item.ownerB}</span>
              <span className={"status " + item.statusClass}>{item.statusText}</span>
            </div>;
          })}
          {/* Duplicate for infinite scroll */}
          {buildTickerItems(liveGames).map(function(item, i){
            return <div className="ticker-item" key={"dup"+i}>
              {item.live && <span className="pulse"></span>}
              <span className="owner">{item.ownerA}</span>
              <span>{item.teamA}</span>
              <span className="score">{item.scoreA}</span>
              <span style={{color:"#555"}}>—</span>
              <span className="score">{item.scoreB}</span>
              <span>{item.teamB}</span>
              <span className="owner">{item.ownerB}</span>
              <span className={"status " + item.statusClass}>{item.statusText}</span>
            </div>;
          })}
        </div>
      </div>

      {/* HEADER */}
      <div className="header">
        <h1>NBA TEAM LEAGUE</h1>
        <div className="sub">2025–26 SEASON · $300 POOL</div>
      </div>

      {/* CHAMPION BANNER */}
      <div className="champ-banner">
        <span className="title">2025–26 REGULAR SEASON CHAMPION</span>
        <span className="crown">👑</span>
        <span className="name">{champion.name.toUpperCase()}</span>
        <span className="prize">{champion.wins} WINS · $150 PRIZE CLAIMED</span>
      </div>

      {/* CONTENT */}
      <div className="content">
        {/* TABS */}
        <div className="tabs">
          <button className={"tab" + (tab==="standings"?" active":"")} onClick={function(){setTab("standings")}}>STANDINGS</button>
          <button className={"tab" + (tab==="playoffs"?" active":"")} onClick={function(){setTab("playoffs")}}>PLAYOFFS</button>
          <button className={"tab" + (tab==="today"?" active":"")} onClick={function(){setTab("today")}}>TODAY</button>
          <button className={"tab" + (tab==="teams"?" active":"")} onClick={function(){setTab("teams")}}>TEAMS</button>
          <button className={"tab" + (tab==="history"?" active":"")} onClick={function(){setTab("history")}}>'24–25</button>
        </div>

        {/* ========= STANDINGS TAB ========= */}
        {tab==="standings" && <div>
          <div className="card">
            <div className="card-hd">
              <span>FINAL STANDINGS</span>
              <span className="badge locked">🔒 LOCKED</span>
            </div>
            <table>
              <thead><tr><th>#</th><th style={{textAlign:"left"}}>MANAGER</th><th>WINS</th><th>GB</th></tr></thead>
              <tbody>
                {mgrTotals.map(function(m, i){
                  var gb = i === 0 ? "—" : (mgrTotals[0].wins - m.wins);
                  return <tr key={m.name} style={{background: i===0?"#FFFDF5":"transparent"}}>
                    <td className={"rank-cell" + (i===0?" gold":"")}>{i+1}</td>
                    <td className="mgr-name">{m.name}{i===0?" 👑":""}</td>
                    <td className={"wins-cell" + (i===0?" lead":"")}>{m.wins}</td>
                    <td className="gb-cell">{gb}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>

          <div className="card" style={{padding:"14px 16px"}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:"#666",marginBottom:8}}>SEASON SUMMARY</div>
            <div style={{fontSize:12,color:"#444",lineHeight:1.7}}>
              <b>Gainzy</b> takes the regular season by <b>1 game</b> over G$, ending Rippe's title defense.
              $150 locked. $150 still live — $75 for the NBA Cup and $75 for the team with the last standing playoff horse.
            </div>
          </div>

          <div className="card">
            <div className="card-hd">
              <span>PRIZE BOARD</span>
              <span className="badge">$300 POOL</span>
            </div>
            <table>
              <tbody>
                <tr>
                  <td style={{textAlign:"left",fontWeight:700,fontSize:12}}>Regular Season</td>
                  <td style={{fontWeight:800,color:"#E8A838"}}>Gainzy 👑</td>
                  <td style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:16}}>$150</td>
                </tr>
                <tr>
                  <td style={{textAlign:"left",fontWeight:700,fontSize:12}}>NBA Cup</td>
                  <td style={{color:"#888",fontSize:11}}>Awarded in December</td>
                  <td style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:16}}>$75</td>
                </tr>
                <tr>
                  <td style={{textAlign:"left",fontWeight:700,fontSize:12}}>Last Team Standing</td>
                  <td style={{color:"#4ade80",fontSize:11,fontWeight:700}}>IN PLAY</td>
                  <td style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:16}}>$75</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>}

        {/* ========= PLAYOFFS TAB ========= */}
        {tab==="playoffs" && <div>
          {/* Manager Playoff Tracker */}
          <div className="card">
            <div className="card-hd">
              <span>TEAMS REMAINING</span>
              <span className="badge live"><span className="live-dot"></span>LIVE</span>
            </div>
            <div className="mgr-tracker">
              {buildManagerPlayoffCounts().map(function(mc, i){
                return <div key={mc.name} className={"mgr-card" + (i===0?" leader":"")}>
                  <div className="mgr">{mc.name}{i===0?" 🏆":""}</div>
                  <div className="count">{mc.remaining}</div>
                  <div className="label">OF 7 REMAINING</div>
                  <div className="teams">
                    {mc.teams.filter(function(t){ return mc.remainingTeams.indexOf(t) > -1; }).map(function(t){

          {/* Bracket */}
          <div className="card">
            <div className="card-hd">
              <span>FIRST ROUND BRACKET</span>
              <span className="badge live"><span className="live-dot"></span>LIVE</span>

              <div className="conf-label">WESTERN CONFERENCE</div>

          {/* Play-in eliminated */}
          <div className="card">

              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {PLAYIN_ELIMINATED.map(function(t){

                    <span style={{textDecoration:"line-through",fontSize:11,fontWeight:600}}>{t}</span>

                  </div>;

              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {MISSED_POSTSEASON.map(function(t){

                    <span style={{fontSize:9,color:"#E8A838",fontWeight:700}}>{OWNER_MAP[t]}</span>
                  </div>;
                })}
              </div>
            </div>
          </div>
        </div>}

        {/* ========= TODAY TAB ========= */}

                    </div>

                  {teams.map(function(t){
                    var r = FINAL_RECORDS[t] || {w:0,l:0};
                    var inPO = PLAYOFF_TEAMS.indexOf(t) > -1;
                    var isElim = !inPO;
                    return <tr key={t}>
                      <td>
                        <div className={"team-row" + (isElim?" elim":"")}>
                          <TeamLogo name={t} size="sm"/>
                          <span className="name">{t}</span>
                        </div>
                      </td>
                      <td style={{fontWeight:700}}>{r.w}</td>
                      <td style={{color:"#999"}}>{r.l}</td>
                      <td>
                        {inPO ? <span className="playoff-tag in">IN</span> :
                          <span className="playoff-tag elim">OUT</span>}
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>;
          })}

        {/* ========= HISTORY TAB ========= */}
        {tab==="history" && <div>
          <div className="card">

              <span>2024–25 FINAL RESULTS</span>
              <span className="badge">COMPLETE</span>
            </div>
            <table>
              <thead><tr><th>#</th><th style={{textAlign:"left"}}>MANAGER</th><th>WINS</th></tr></thead>
              <tbody>
                {HIST.rosters.map(function(m, i){

  // ============ INLINE HELPER FUNCTIONS ============
  function buildTickerItems(games){
    var playoffSet = {};
    PLAYOFF_TEAMS.forEach(function(t){ playoffSet[t] = true; });
    var po = games.filter(function(g){
      return playoffSet[g.home.team] && playoffSet[g.away.team];
    });
    if(po.length === 0){
      // Show series status summary
      return PLAYOFF_BRACKET.east.concat(PLAYOFF_BRACKET.west).map(function(s){
        var key = s.hi + "_" + s.lo;
        var st = series[key] || {hiWins:0,loWins:0};
        return {
          teamA: s.hi, teamB: s.lo,
          ownerA: OWNER_MAP[s.hi] || "", ownerB: OWNER_MAP[s.lo] || "",
          scoreA: st.hiWins, scoreB: st.loWins,
          statusText: "SERIES", statusClass: "",
          live: false

      });
    }
    return po.map(function(g){
      var isLive = g.state === "in";
      return {
        teamA: g.away.team, teamB: g.home.team,
        ownerA: OWNER_MAP[g.away.team] || "",
        ownerB: OWNER_MAP[g.home.team] || "",
        scoreA: g.away.score, scoreB: g.home.score,
        statusText: g.detail || (isLive ? "LIVE" : "FINAL"),
        statusClass: isLive ? "live" : (g.completed ? "final" : ""),
        live: isLive
      };
    });
  }

  function buildManagerPlayoffCounts(){
    var eliminatedSet = {};
    // Fully eliminated: missed postseason + play-in losers
    MISSED_POSTSEASON.concat(PLAYIN_ELIMINATED).forEach(function(t){ eliminatedSet[t] = true; });
    // Plus any series where team has 4 losses
    Object.keys(series).forEach(function(key){
      var parts = key.split("_");
      var hi = parts[0], lo = parts[1];
      var st = series[key];
      if(st.hiWins >= 4) eliminatedSet[lo] = true;
      if(st.loWins >= 4) eliminatedSet[hi] = true;
    });

    var rows = Object.keys(ROSTERS).map(function(mgr){
      var teams = ROSTERS[mgr];
      var remaining = teams.filter(function(t){ return !eliminatedSet[t]; });
      return { name: mgr, remaining: remaining.length, remainingTeams: remaining, teams: teams };
    });
    rows.sort(function(a,b){ return b.remaining - a.remaining; });
    return rows;
  }

  function renderSeries(s, series){
    var key = s.hi + "_" + s.lo;
    var st = series[key] || { hiWins: 0, loWins: 0 };
    var hiAdvanced = st.hiWins >= 4;
    var loAdvanced = st.loWins >= 4;
    var hiEliminated = loAdvanced;
    var loEliminated = hiAdvanced;
    var done = hiAdvanced || loAdvanced;

    var ongoing = (st.hiWins > 0 || st.loWins > 0) && !done;
    var statusEl = done ? <span className="status-done">FINAL</span> :
                    ongoing ? <span className="status-live"><span className="dot"></span>IN PROGRESS</span> :
                    <span style={{color:"#aaa"}}>UPCOMING</span>;

    return <div key={key} className={"series" + (done?" final":"")}>
      <div className="series-hd">
        <span className="seed-tag">{s.hiSeed} vs {s.loSeed}</span>
        {statusEl}
      </div>
      <div className={"series-row" + (hiEliminated?" eliminated":"") + (hiAdvanced?" advanced":"")}>
        <div className="left">
          <span className="seed">{s.hiSeed}</span>
          <TeamLogo name={s.hi} size="md"/>
          <div className="team-info">
            <div className="name">{s.hi}</div>
            <div className="owner">{OWNER_MAP[s.hi]}</div>
          </div>
        </div>
        <div className="wins">{st.hiWins}</div>
      </div>
      <div className="vs-divider">VS</div>
      <div className={"series-row" + (loEliminated?" eliminated":"") + (loAdvanced?" advanced":"")}>
        <div className="left">
          <span className="seed">{s.loSeed}</span>
          <TeamLogo name={s.lo} size="md"/>
          <div className="team-info">
            <div className="name">{s.lo}</div>
            <div className="owner">{OWNER_MAP[s.lo]}</div>
          </div>
        </div>
        <div className="wins">{st.loWins}</div>
      </div>
    </div>;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
