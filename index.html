<script type="text/babel">

  },[]);

    if(ranked2[0]){weekSaved.current=true;var sn={};ranked2.forEach(function(r){sn[r.name]=r.rank});push({prevRankings:sn,prevRankingsDate:td})}
  },[state&&state.draftLocked]);

  function push(up){
    var safe={};Object.keys(up).forEach(function(k){safe[k]=up[k]});
    if(safe.managers)safe.managers=safe.managers.map(function(m){return{name:m.name,teams:m.teams.length===0?["_"]:m.teams}});

    var mg={};if(state)Object.keys(state).forEach(function(k){mg[k]=state[k]});Object.keys(up).forEach(function(k){mg[k]=up[k]});

  if(!state)return <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",fontSize:18,color:N}}>Loading...</div>;

  var rc=state.records,mg=state.managers,dlk=state.draftLocked,prk=state.prevRankings;

  function stats(m){var tw=0,tl=0,bt="",bw=-1;(m.teams||[]).forEach(function(t){var r=rc[t]||{w:0,l:0};tw+=r.w;tl+=r.l;if(r.w>bw){bw=r.w;bt=t}});return{tw:tw,tl:tl,bt:bt,bw:bw,avg:(m.teams||[]).length>0?(tw/(m.teams||[]).length):0}}

            </div>
            <table className="st-table" style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:LN}}>{["RK","","MANAGER","WINS","GB","AVG W","BEST TEAM"].map(function(h){return <th key={h} style={{padding:"9px 14px",fontSize:h==="WINS"?12:9,fontWeight:h==="WINS"?800:700,color:h==="WINS"?GR:N,letterSpacing:1.5,textAlign:h==="MANAGER"?"left":"center"}}>{h}</th>})}</tr></thead>
              <tbody>{ranked.map(function(m,i){
                var gb=i===0?"-":(top-m.s.tw);
                var mv=getMv(m.name,i+1);
                var mvE=mv===null?"":mv>0?<span className="mu">{"▲"}{mv}</span>:mv<0?<span className="md">{"▼"}{Math.abs(mv)}</span>:<span className="ms">-</span>;
                return <tr key={m.name||i} style={{background:i===0?LO:i%2===0?"#FAFAFA":"#fff"}}>
                  <td style={{padding:"12px 14px",textAlign:"center",fontWeight:800,fontSize:16,color:i===0?O:N,fontFamily:"'Playfair Display',serif"}}>{i+1}</td>
                  <td style={{textAlign:"center",padding:"4px 2px"}}>{mvE}</td>
                  <td style={{padding:"12px 14px",fontWeight:700,fontSize:14,color:N}}>{m.name||"-"}{m.name==="Gainzy"?" 👑":""}</td>
                  <td style={{textAlign:"center",fontWeight:900,fontSize:22,color:GR,fontFamily:"'Playfair Display',serif"}}>{m.s.tw}</td>
                  <td style={{textAlign:"center",color:typeof gb==="number"?RD:GY,fontWeight:700,fontSize:14}}>{gb}</td>
                  <td style={{textAlign:"center",fontSize:12,color:GY}}>{m.s.avg.toFixed(1)}</td>
                  <td style={{textAlign:"center",fontSize:12,fontWeight:600,color:N}}>{m.s.bt?<TeamName name={m.s.bt} sz={15}/>:""}{m.s.bw>0?" ("+m.s.bw+"W)":""}</td>
                </tr>})}</tbody>
            </table>
            </div>
          </Card>

          {/* Badges */}
          {dlk&&ranked.some(function(m){return(badges[m.name]||[]).length>0})&&<Card style={{marginBottom:20}}>
            <Hdr>MILESTONE BADGES</Hdr>
            <div style={{padding:"14px 18px",display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:12}}>
              {ranked.map(function(m,i){var mb=badges[m.name]||[];if(!mb.length)return null;return <div key={m.name} style={{padding:"10px 14px",background:i===0?LO:"#FAFAFA",borderRadius:8,border:"1px solid #E5E7EB"}}><div style={{fontSize:12,fontWeight:700,color:N,marginBottom:6}}>{m.name}</div>{mb.map(function(b,bi){return <div key={bi} style={{fontSize:11,color:GY,marginBottom:3}}>{b}</div>})}</div>})}
            </div>
          </Card>}

          {/* 2023-24 Results */}
          <Card>
            <div style={{background:N,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#fff",fontSize:13,fontWeight:700}}>2024-25 SEASON RESULTS</span><span style={{color:O,fontSize:10}}>FINAL STANDINGS</span></div>
            <div style={{padding:"16px 20px",fontSize:12,color:GY,lineHeight:1.8}}>
              <div style={{fontWeight:700,color:N,marginBottom:6}}>Champion: Gainzy</div>
              Gainzy dominated with Thunder (68W), Timberwolves (49W), Grizzlies (48W), Pistons (44W), Magic (41W), Kings (40W), and Suns (36W) for a league-leading 326 total wins. OKC Thunder won the NBA Championship.
            </div>
          </Card>
        </div>}

        {/* ══════ ROSTERS ══════ */}
        {tab==="rosters"&&<div className="roster-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(240px, 1fr))",gap:14,animation:"fadeIn .3s ease"}}>
          {ranked.map(function(m,mi){return <Card key={m.name||mi}>
            <div style={{background:N,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#fff",fontWeight:700,fontSize:14}}>{m.name||"-"}</span><span style={{color:O,fontWeight:900,fontSize:20,fontFamily:"'Playfair Display',serif"}}>{m.s.tw}<span style={{fontSize:10,fontWeight:600,marginLeft:2}}>W</span></span></div>
            {(badges[m.name]||[]).length>0&&<div style={{padding:"5px 12px",background:LO,borderBottom:"1px solid #E5E7EB",display:"flex",flexWrap:"wrap",gap:6}}>{(badges[m.name]||[]).map(function(b,bi){return <span key={bi} style={{fontSize:9,color:N,fontWeight:600}}>{b}</span>})}</div>}
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:LN}}><th style={{padding:"7px 12px",fontSize:9,fontWeight:700,color:N,textAlign:"left"}}>TEAM</th><th style={{padding:"7px 10px",fontSize:11,fontWeight:800,color:GR,textAlign:"center"}}>WINS</th></tr></thead>
              <tbody>{[].concat(m.teams||[]).sort(function(a,b){return(rc[b]?rc[b].w:0)-(rc[a]?rc[a].w:0)}).map(function(t,ti){var r=rc[t]||{w:0,l:0};return <tr key={t} style={{background:ti%2===0?"#FAFAFA":"#fff",borderLeft:t===m.s.bt?"3px solid "+O:"3px solid transparent"}}><td style={{padding:"8px 12px",fontSize:12,color:N}}><TeamName name={t} sz={16}/></td><td style={{textAlign:"center",fontSize:15,fontWeight:800,color:GR}}>{r.w}</td></tr>})}</tbody>
              <tfoot><tr style={{background:LO}}><td style={{padding:"8px 12px",fontWeight:700,fontSize:11,color:N}}>TOTAL WINS</td><td style={{textAlign:"center",fontWeight:900,fontSize:18,color:GR,fontFamily:"'Playfair Display',serif"}}>{m.s.tw}</td></tr></tfoot>
            </table>
          </Card>})}
        </div>}

        {/* ══════ DRAFT ══════ */}
        {tab==="draft"&&<div style={{animation:"fadeIn .3s ease"}}>
          <div className="draft-layout" style={{display:"flex",gap:12}}>
            <div style={{flex:1,minWidth:0}}>
              <Card style={{marginBottom:14}}>
                <Hdr right="SNAKE FORMAT — 7 ROUNDS">2026 DRAFT RESULTS</Hdr>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:480}}>
                  <thead><tr style={{background:N}}><th style={{padding:"7px",color:"#fff",fontSize:9,fontWeight:700,width:36}}>RD</th>{state.draftOrder&&state.draftOrder.map(function(mIdx,pos){return <th key={pos} style={{padding:"7px 10px",color:"#fff",fontSize:11,fontWeight:700}}>{state.draftManagers[mIdx]}<div style={{fontSize:8,color:O,marginTop:1}}>#{pos+1}</div></th>})}</tr></thead>
                  <tbody>{[0,1,2,3,4,5,6].map(function(rd){
                    var base=state.draftOrder||[0,1,2,3];
                    var snk=rd%2===0?[].concat(base):[].concat(base).reverse();
                    return <tr key={rd} style={{background:rd%2===0?"#FAFAFA":"#fff"}}><td style={{textAlign:"center",fontWeight:800,color:N,fontSize:11,padding:7,background:LN}}>{rd+1}</td>{(state.draftOrder||[0,1,2,3]).map(function(mIdx,col){var tp=(state.draftPicks[mIdx]||[])[rd]||"";return <td key={col} style={{padding:"7px 8px",textAlign:"center",fontSize:11,fontWeight:tp?600:400,color:tp?N:"#CCC"}}>{tp?<TeamName name={tp} sz={14}/>:"-"}</td>})}</tr>
                  })}</tbody>
                </table>
                <div style={{padding:"10px 16px",background:LO,fontSize:11,color:GY}}>Draft complete — All picks are final and locked. Undrafted: {UNDRAFTED.join(", ")}</div>
              </Card>
            </div>

            {/* Chat Sidebar */}
            <div className="draft-sidebar" style={{width:250,minWidth:250,display:"flex",flexDirection:"column"}}>
              <Card style={{display:"flex",flexDirection:"column",flex:1}}>
                <div style={{background:N,padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#fff",fontSize:10,fontWeight:700}}>TRASH TALK</span><span style={{color:O,fontSize:9}}>{chatMsgs.length} msgs</span></div>
                <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:"6px 10px",background:"#FAFAFA",minHeight:200}}>
                  {chatMsgs.length===0&&<div style={{textAlign:"center",padding:24,color:GY,fontSize:11}}>No messages yet.</div>}
                  {chatMsgs.map(function(m,i){return <div key={i} style={{marginBottom:8}}><div style={{display:"flex",alignItems:"baseline",gap:5}}><span style={{fontSize:11,fontWeight:700,color:N}}>{m.name}</span><span style={{fontSize:8,color:"#C0C0C0"}}>{new Date(m.ts).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}</span></div><div style={{fontSize:11,color:GY,marginTop:1}}>{m.msg}</div></div>})}
                </div>
                <div style={{padding:"7px 10px",borderTop:"1px solid #E5E7EB"}}>
                  {!chatName.trim()?<input value={chatName} onChange={function(e){setChatName(e.target.value)}} placeholder="Your name" style={{width:"100%",padding:"7px 10px",border:"1px solid #DDD",borderRadius:5,fontSize:11}}/>:
                  <div><div style={{fontSize:9,fontWeight:700,color:O,marginBottom:3}}>{chatName}</div><div style={{display:"flex",gap:5}}><input value={chatInput} onChange={function(e){setChatInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")sendChat()}} placeholder="Talk trash..." style={{flex:1,padding:"7px 10px",border:"1px solid #DDD",borderRadius:5,fontSize:11}}/><button onClick={sendChat} style={{background:O,color:"#fff",border:"none",borderRadius:5,padding:"7px 10px",fontSize:9,fontWeight:700}}>SEND</button></div></div>}
                </div>
              </Card>
            </div>
          </div>
        </div>}

        {/* ══════ NBA DATA ══════ */}
        {tab==="records"&&<div style={{animation:"fadeIn .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:10,fontWeight:700,color:N,letterSpacing:1.5}}>NBA TEAM RECORDS</span>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {!recOk&&<input type="password" placeholder="Admin password" value={recPwd} onChange={function(e){setRecPwd(e.target.value)}} style={{padding:"5px 10px",border:"1px solid #DDD",borderRadius:5,fontSize:11,width:120}}/>}
              {recOk&&<button onClick={function(){setEditRec(!editRec)}} style={{background:editRec?GR:N,color:"#fff",border:"none",padding:"6px 16px",fontSize:11,fontWeight:700,borderRadius:5}}>{editRec?"Done":"Edit"}</button>}
              {recOk&&isAdm&&<button onClick={saveWeek} style={{background:O,color:"#fff",border:"none",padding:"6px 16px",fontSize:11,fontWeight:700,borderRadius:5}}>SAVE WEEK</button>}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))",gap:14}}>
            {DIVS.map(function(div){return <Card key={div.name}>
              <div style={{background:N,padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#fff",fontSize:11,fontWeight:700}}>{div.name}</span><span style={{color:O,fontSize:9}}>{div.name.match(/Atlantic|Central|Southeast/)?"Eastern":"Western"}</span></div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:LN}}><th style={{padding:"7px 10px",fontSize:9,fontWeight:700,color:N,textAlign:"left",letterSpacing:1}}>TEAM</th><th style={{padding:"7px 7px",fontSize:10,fontWeight:800,color:GR,textAlign:"center"}}>W</th><th style={{padding:"7px 7px",fontSize:9,fontWeight:600,color:"#C0C0C0",textAlign:"center"}}>L</th><th style={{padding:"7px 10px",fontSize:9,fontWeight:700,color:N,textAlign:"left"}}>OWNER</th></tr></thead>
                <tbody>{[].concat(div.teams).sort(function(a,b){return(rc[b]?rc[b].w:0)-(rc[a]?rc[a].w:0)}).map(function(t,i){
                  var r=rc[t]||{w:0,l:0};var owner="-";mg.forEach(function(m){if((m.teams||[]).includes(t))owner=m.name});
                  return <tr key={t} style={{background:i%2===0?"#FAFAFA":"#fff"}}>
                    <td style={{padding:"7px 10px",fontWeight:600,fontSize:11,color:N}}><TeamName name={t} sz={15}/></td>
                    <td style={{textAlign:"center",padding:"7px 5px"}}>{editRec?<input type="number" value={r.w} onChange={function(e){setRc(t,"w",e.target.value)}} style={{width:44,textAlign:"center",border:"2px solid "+GR,borderRadius:4,padding:2,fontSize:12,fontWeight:800,color:GR}}/>:<span style={{fontWeight:800,color:GR,fontSize:13}}>{r.w}</span>}</td>
                    <td style={{textAlign:"center",padding:"7px 5px"}}>{editRec?<input type="number" value={r.l} onChange={function(e){setRc(t,"l",e.target.value)}} style={{width:40,textAlign:"center",border:"1px solid #DDD",borderRadius:4,padding:2,fontSize:10,color:"#C0C0C0"}}/>:<span style={{color:"#C0C0C0",fontSize:10}}>{r.l}</span>}</td>
                    <td style={{padding:"7px 10px",fontSize:10,color:owner==="-"?"#CCC":O,fontWeight:600}}>{owner}</td>
                  </tr>})}</tbody>
              </table>
            </Card>})}
          </div>
        </div>}

        {/* ══════ RULES ══════ */}
        {tab==="rules"&&<div style={{animation:"fadeIn .3s ease"}}>
          <Card style={{marginBottom:20}}>
            <Hdr>NBA TEAM LEAGUE — OFFICIAL RULES</Hdr>
            <div style={{padding:"20px"}}>
              <div style={{fontSize:16,fontWeight:900,color:N,fontFamily:"'Playfair Display',serif",marginBottom:14}}>WINS ARE ALL THAT MATTER</div>
              {[
                {title:"THE GAME",items:["NBA Team League is a season-long fantasy game where 4 managers draft NBA teams and compete based on total regular season wins.","The manager whose 7 teams accumulate the most combined wins by end of regular season is crowned champion."]},
                {title:"THE DRAFT",items:["Snake draft format — 7 rounds, 4 managers, 28 of 30 NBA teams drafted.","Draft order randomized on draft night. Rounds alternate direction (1-2-3-4, then 4-3-2-1).","Once picked, all selections are final and locked."]},
                {title:"SCORING",items:["Only regular season WINS count. Losses and postseason do not affect standings.","Each manager's 7 team wins are totaled throughout the season."]},
                {title:"TIEBREAKER",items:["Tie in total wins: manager whose single best team has the most wins declared winner."]},
                {title:"ENTRY & PRIZES",items:["Entry: $75 per manager ($50 regular season + $25 NBA Finals pick).","Regular Season Champion: $150. NBA Finals Pick Winner: $75. Best Single Team: Bragging Rights."]},
                {title:"NBA FINALS PICK",items:["Each manager picks one team to win the NBA Finals. Separate $25 entry, $75 payout. Pick doesn't need to be on your roster."]}
              ].map(function(s){return <div key={s.title} style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:800,color:O,letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>{s.title}</div>
                {s.items.map(function(item,i){return <div key={i} style={{fontSize:12,color:GY,lineHeight:1.8,marginBottom:3}}><span style={{color:N,marginRight:5}}>{">"}</span>{item}</div>})}
              </div>})}
            </div>
          </Card>
          <div style={{background:N,borderRadius:10,padding:"28px 20px",textAlign:"center"}}>
            <div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:3,marginBottom:6}}>SUPPORT THE LEAGUE</div>
            <div style={{fontSize:18,fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",marginBottom:6}}>Buy the Commissioner a Coffee</div>
            <div style={{fontSize:11,color:"#ffffff70",marginBottom:16}}>Help keep NBA Team League running. Suggested: $1</div>
            <a href="https://venmo.com/michaelrippe?txn=pay&amount=1&note=NBA%20Team%20League%20Support" target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,background:"#008CFF",color:"#fff",textDecoration:"none",padding:"10px 28px",borderRadius:20,fontSize:13,fontWeight:700}}>Support via Venmo — $1</a>
            <div style={{fontSize:9,color:"#ffffff40",marginTop:10}}>@michaelrippe</div>
          </div>
        </div>}

        {/* ══════ SIGN UP ══════ */}
        {tab==="signup"&&<div style={{animation:"fadeIn .3s ease"}}>
          <div style={{background:N,borderRadius:10,padding:"36px 20px",textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:4,marginBottom:6}}>COMING SOON</div>
            <div style={{fontSize:24,fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",marginBottom:6}}>Team League is Expanding</div>
            <div style={{fontSize:13,color:"#ffffff70",maxWidth:460,margin:"0 auto"}}>The same draft-and-compete format — coming to more sports.</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(130px, 1fr))",gap:12,marginBottom:20}}>
            {[{name:"NBA",status:"ACTIVE",color:GR},{name:"MLB",status:"ACTIVE",color:GR},{name:"NFL",status:"COMING 2026",color:O},{name:"NHL",status:"COMING 2027",color:GY},{name:"World Cup",status:"COMING 2026",color:O}].map(function(lg){
              var sel=signLeagues.includes(lg.name);
              return <div key={lg.name} onClick={function(){if(lg.status!=="ACTIVE")toggleLeague(lg.name)}} style={{background:"#fff",borderRadius:10,padding:"16px 12px",textAlign:"center",border:sel?"2px solid "+O:"1px solid #E5E7EB",cursor:lg.status==="ACTIVE"?"default":"pointer",opacity:lg.status==="ACTIVE"?0.7:1}}>
                <div style={{fontSize:13,fontWeight:800,color:N}}>{lg.name}</div>
                <div style={{fontSize:9,fontWeight:700,color:lg.color,letterSpacing:1,marginTop:3}}>{lg.status}</div>
                {lg.status!=="ACTIVE"&&<div style={{fontSize:8,color:sel?GR:GY,marginTop:3}}>{sel?"SELECTED":"Click to select"}</div>}
              </div>
            })}
          </div>
          <Card>
            <Hdr>SIGN UP FOR FUTURE LEAGUES</Hdr>
            {signSent?<div style={{padding:"36px 20px",textAlign:"center"}}><div style={{fontSize:28,marginBottom:10}}>{"✅"}</div><div style={{fontSize:16,fontWeight:800,color:N,fontFamily:"'Playfair Display',serif"}}>You're on the list!</div></div>:
            <div style={{padding:"18px"}}>
              <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:N,letterSpacing:1,marginBottom:4}}>NAME</div><input value={signName} onChange={function(e){setSignName(e.target.value)}} placeholder="Full name" style={{width:"100%",padding:"10px 12px",border:"1px solid #DDD",borderRadius:6,fontSize:13,color:N,boxSizing:"border-box"}}/></div>
              <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:N,letterSpacing:1,marginBottom:4}}>EMAIL</div><input value={signEmail} onChange={function(e){setSignEmail(e.target.value)}} placeholder="your@email.com" type="email" style={{width:"100%",padding:"10px 12px",border:"1px solid #DDD",borderRadius:6,fontSize:13,color:N,boxSizing:"border-box"}}/></div>
              <button onClick={submitSignup} disabled={!signName.trim()||!signEmail.trim()} style={{width:"100%",background:signName.trim()&&signEmail.trim()?O:"#D1D5DB",color:signName.trim()&&signEmail.trim()?"#fff":"#999",border:"none",borderRadius:6,padding:"12px",fontSize:13,fontWeight:800,cursor:signName.trim()&&signEmail.trim()?"pointer":"not-allowed"}}>SIGN UP</button>
            </div>}
          </Card>
        </div>}

      </div>

      <div style={{textAlign:"center",padding:"10px 0 14px",fontSize:9,color:GY}}>NBA Team League 2026 — Est. 2024 — $225 Prize Pool — Defending Champ: Gainzy</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
