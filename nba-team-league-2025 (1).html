<Cd s={{marginBottom:16}}>

<input type="range" min="0" max="100" value={rate} onChange={function(e){setSR(m.name,e.target.value)}} style={{width:"100%",accentColor:O}}/>
<div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:GY,marginTop:2}}><span>Win rate: {rate}%</span><span>{m.tw}W + {Math.round(m.rem*rate/100)} = {proj}W</span></div>
</div>})}
<div style={{borderTop:"1px solid #E5E7EB",paddingTop:8,marginTop:4}}>
<div style={{fontSize:9,fontWeight:700,color:N,letterSpacing:1,marginBottom:6}}>SIMULATED FINAL</div>
{[].concat(ranked).map(function(m){return{name:m.name,p:m.tw+Math.round(m.rem*getSimRate(m.name)/100)}}).sort(function(a,b){return b.p-a.p}).map(function(m,i){return <div key={m.name} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}><span style={{fontSize:11,fontWeight:i===0?800:600,color:i===0?O:N}}>{i+1}. {m.name}</span><span style={{fontSize:12,fontWeight:900,color:i===0?O:GR,fontFamily:"'Playfair Display',serif"}}>{m.p}W</span></div>})}
</div>
</div>
</Cd>

{ranked.map(function(m){var pTeams=0;m.teams.forEach(function(t){if((rc[t]||{w:0}).w>=35)pTeams++});return <div key={m.name} style={{marginBottom:12,padding:"8px 10px",background:m===ranked[0]?LO:"#FAFAFA",borderRadius:6,border:"1px solid #E5E7EB"}}>
